version: '3.9'

services:
  pocketbase:
    image: alpine:3.20
    working_dir: /pb
    env_file:
      - ./apps/api/.env
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache curl unzip ca-certificates >/dev/null
        PB_VERSION="$$(cat /pb/.pocketbase-version 2>/dev/null || echo 0.38.0)"
        case "$$(uname -m)" in
          x86_64|amd64) PB_ARCH="amd64" ;;
          aarch64|arm64) PB_ARCH="arm64" ;;
          *) echo "Unsupported PocketBase architecture: $$(uname -m)"; exit 1 ;;
        esac
        PB_FILENAME="pocketbase_$${PB_VERSION}_linux_$${PB_ARCH}.zip"
        PB_URL="https://github.com/pocketbase/pocketbase/releases/download/v$${PB_VERSION}/$${PB_FILENAME}"
        PB_CHECKSUMS_URL="https://github.com/pocketbase/pocketbase/releases/download/v$${PB_VERSION}/checksums.txt"
        if ! /pb/pocketbase --version >/dev/null 2>&1; then
          echo "Downloading PocketBase v$${PB_VERSION} for linux/$${PB_ARCH}"
          curl -fsSL "$${PB_URL}" -o /tmp/pocketbase.zip
          curl -fsSL "$${PB_CHECKSUMS_URL}" -o /tmp/checksums.txt
          EXPECTED_SHA="$$(grep "  $${PB_FILENAME}$$" /tmp/checksums.txt | awk '{print $$1}')"
          if [ -z "$${EXPECTED_SHA}" ]; then
            echo "ERROR: checksum entry not found for $${PB_FILENAME}"
            exit 1
          fi
          ACTUAL_SHA="$$(sha256sum /tmp/pocketbase.zip | awk '{print $$1}')"
          if [ "$${ACTUAL_SHA}" != "$${EXPECTED_SHA}" ]; then
            echo "ERROR: checksum mismatch for $${PB_FILENAME}"
            echo "Expected: $${EXPECTED_SHA}"
            echo "Actual:   $${ACTUAL_SHA}"
            exit 1
          fi
          unzip -o /tmp/pocketbase.zip pocketbase -d /pb >/dev/null
          chmod +x /pb/pocketbase
        fi
        exec /pb/pocketbase serve --http=0.0.0.0:8090 --dir=/pb/pb_data --migrationsDir=/pb/pb_migrations --hooksDir=/pb/pb_hooks --hooksWatch=false
    volumes:
      - ./apps/pocketbase:/pb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/api/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=production
      - PB_BASE_URL=http://pocketbase:8090
      - WEBSITE_DOMAIN=tbuy.store
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health',{method:'GET'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1));"]
      interval: 15s
      timeout: 7s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${APP_HTTP_PORT:-18080}:80"
    volumes:
      - ./deploy/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
      pocketbase:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
