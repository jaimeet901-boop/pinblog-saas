version: '3.9'

services:
  pocketbase:
    image: alpine:3.20
    working_dir: /pb
    command: ["./pocketbase", "serve", "--http=0.0.0.0:8090"]
    volumes:
      - ./apps/pocketbase:/pb
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=production
      - PB_BASE_URL=http://pocketbase:8090
    depends_on:
      - pocketbase
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
    restart: unless-stopped
